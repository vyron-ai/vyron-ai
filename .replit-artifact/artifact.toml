kind = "web"
previewPath = "/"
title = "VYRON AI"
version = "1.0.0"
id = "artifacts/vyron-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22853

[services.development]
run = "pnpm --filter @workspace/vyron-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vyron-ai", "run", "build" ]
publicDir = "artifacts/vyron-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22853"
BASE_PATH = "/"
